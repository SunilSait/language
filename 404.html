<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 — Page Not Found | LinguaBridge</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Ccircle cx='50' cy='50' r='45' stroke='%232563EB' stroke-width='2' stroke-opacity='0.5' fill='none'/%3E%3Cpath d='M42 35 L42 65 L60 65' stroke='%232563EB' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
<div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-4 py-16" style="background:linear-gradient(145deg,#020617 0%,#0F172A 100%);">
    <!-- Top-right controls -->
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
        <button class="icon-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-exchange-alt"></i></button>
    </div>

    <!-- Background decorations -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute w-[600px] h-[600px] rounded-full" style="background:radial-gradient(circle,rgba(37,99,235,0.06) 0%,transparent 70%);top:-200px;right:-200px;"></div>
        <div class="absolute w-[400px] h-[400px] rounded-full" style="background:radial-gradient(circle,rgba(37,99,235,0.04) 0%,transparent 70%);bottom:-150px;left:-150px;"></div>
        <div class="absolute inset-0" style="background-image:linear-gradient(rgba(37,99,235,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.02) 1px,transparent 1px);background-size:60px 60px;"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 text-center max-w-2xl">
        <!-- Logo -->
        <div class="mb-14">
            <a href="index.html" class="inline-flex items-center gap-2.5 group">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                    <defs><linearGradient id="g404" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563EB"/><stop offset="50%" stop-color="#93C5FD"/><stop offset="100%" stop-color="#2563EB"/></linearGradient></defs>
                    <circle cx="50" cy="50" r="45" stroke="#2563EB" stroke-width="2" stroke-opacity="0.5" fill="none"/>
                    <circle cx="50" cy="50" r="22" fill="url(#g404)" fill-opacity="0.10" stroke="url(#g404)" stroke-width="1.5"/>
                    <path d="M42 35 L42 65 L60 65" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span class="font-bold text-xl text-white group-hover:text-[#2563EB] transition-colors" style="font-family:'Playfair Display',serif;">LinguaBridge</span>
            </a>
        </div>

        <!-- 404 Badge -->
        <div class="mb-8">
            <div class="relative inline-block">
                <div class="absolute inset-0 rounded-3xl border-2 border-dashed border-[#2563EB]/20 scale-110"></div>
                <div class="relative px-10 py-8 rounded-3xl" style="background:rgba(37,99,235,0.05);border:1px solid rgba(37,99,235,0.15);">
                    <div class="text-[7rem] sm:text-[9rem] font-bold leading-none" style="font-family:'Playfair Display',serif;background:linear-gradient(135deg,#2563EB 0%,#93C5FD 50%,#1D4ED8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">404</div>
                    <div class="absolute top-3 right-4 text-[10px] text-[#2563EB]/40 font-bold uppercase tracking-[0.2em] rotate-12">NOT FOUND</div>
                    <div class="absolute bottom-3 left-4 text-[10px] text-[#2563EB]/30 font-bold uppercase tracking-[0.15em] -rotate-6">LINGUABRIDGE</div>
                </div>
            </div>
        </div>

        <h1 class="text-white mb-4" style="font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);">
            Lost in <span class="blue-text">Translation</span>
        </h1>
        <p class="text-neutral-400 text-lg mb-10 max-w-lg mx-auto">The page you're looking for has been moved, removed, or never existed. Even our best translators couldn't find it.</p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
            <a href="index.html" class="btn btn-primary btn-lg btn-shine">
                <i class="fas fa-house text-xs"></i> Back to Home
            </a>
            <a href="contact.html" class="btn btn-lg" style="border:1.5px solid rgba(37,99,235,0.35);color:#60A5FA;">
                <i class="fas fa-envelope text-xs"></i> Contact Us
            </a>
        </div>

        <!-- Quick links -->
        <div class="flex flex-wrap justify-center gap-4">
            <a href="services.html" class="text-xs text-neutral-500 hover:text-[#2563EB] transition-colors uppercase tracking-widest font-semibold">Services</a>
            <span class="text-neutral-700">·</span>
            <a href="pricing.html" class="text-xs text-neutral-500 hover:text-[#2563EB] transition-colors uppercase tracking-widest font-semibold">Pricing</a>
            <span class="text-neutral-700">·</span>
            <a href="about.html" class="text-xs text-neutral-500 hover:text-[#2563EB] transition-colors uppercase tracking-widest font-semibold">About</a>
        </div>
    </div>
</div>

<script src="script.js"></script>

</html>
